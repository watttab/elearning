  <!-- Global Error Handler -->
  <script>
    // Global Error Boundary
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      console.error("Global Error:", msg, error);
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="color:red;text-align:center;padding:50px;font-family:sans-serif;">' +
          '<h2>เกิดข้อผิดพลาด (Global Error)</h2>' +
          '<p>' + msg + '</p>' +
          '<button onclick="window.location.reload()" style="margin-top:20px;padding:10px 20px;background:#7c3aed;color:white;border:none;border-radius:8px;cursor:pointer;">รีโหลดหน้าเว็บ</button>' +
          '</div>';
      }
      return false;
    };
  </script>
