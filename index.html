          <button id="adminCloseBtn" class="btn-outline btn-sm">
            <span>✖</span>
            <span data-i18n="btnClose">ปิด</span>
          </button>
        </div>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="settings">⚙️ <span data-i18n="tabSettings">ตั้งค่า</span></button>
          <button class="admin-tab" data-tab="lessons">📚 <span data-i18n="tabLessons">บทเรียน</span></button>
          <button class="admin-tab" data-tab="contents">📄 <span data-i18n="tabContents">เนื้อหา</span></button>
          <button class="admin-tab" data-tab="questions">❓ <span data-i18n="tabQuestions">คำถาม</span></button>
        </div>
        <div id="adminSettings" class="admin-panel active"></div>
        <div id="adminLessons" class="admin-panel"></div>
        <div id="adminContents" class="admin-panel"></div>
        <div id="adminQuestions" class="admin-panel"></div>
        <button id="adminSaveBtn" class="btn-primary btn-full btn-glow">
          <span>💾</span>
          <span data-i18n="btnSaveAll">บันทึกข้อมูลทั้งหมด</span>
        </button>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p data-i18n="footerText">ระบบ Micro Learning — เรียนสั้น เข้าใจง่าย วัดผลได้</p>
      <p class="footer-sub" data-i18n="footerSub">พัฒนาเพื่อการศึกษาไทย 🇹🇭</p>
    </div>
  </footer>
  <!-- QR Code Modal -->
  <div id="qrModal" class="modal-overlay">
    <div class="modal-card glass-card">
      <div class="modal-header">
        <h3 data-i18n="qrTitle">QR Code สำหรับแชร์บทเรียน</h3>
        <button id="qrCloseBtn" class="icon-btn">&times;</button>
      </div>
      <div class="qr-canvas"><canvas id="qrCanvas"></canvas></div>
      <p class="qr-url" id="qrUrl"></p>
      <button id="qrCopyBtn" class="btn-outline btn-full">
        <span>📋</span>
        <span data-i18n="btnCopyLink">คัดลอกลิงก์</span>
      </button>
    </div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
